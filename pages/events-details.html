<section class="bg-escuela-azul-oscuro min-h-screen overflow-x-hidden">

  <!-- Hero -->
  <header class="relative h-[65vh] w-full overflow-hidden">
    <div id="event-hero-bg"
         class="absolute inset-0 bg-cover bg-center scale-110"></div>

    <div class="absolute inset-0 bg-gradient-to-t 
                from-escuela-azul-oscuro 
                via-escuela-azul-oscuro/80 
                to-transparent"></div>

    <div class="absolute inset-0 bg-gradient-to-r 
                from-escuela-azul-oscuro/60 
                to-transparent"></div>
  </header>

  <!-- Contenido -->
  <div class="container mx-auto px-6 -mt-32 relative z-10">

    <!-- Volver -->
    <button onclick="loadPage('events.html')"
      class="fixed top-12 mt-24 bg-white text-escuela-azul-oscuro px-5 py-3 rounded-full shadow-xl hover:-translate-y-1 hover:shadow-2xl transition">
      ← Volver a eventos
    </button>

    <!-- Breadcrumb -->
    <nav class="mb-4 mt-16 text-gray-300 flex gap-2">
      <button onclick="loadPage('events.html')" class="hover:text-white">
        Eventos
      </button>
      <span>/</span>
      <span id="breadcrumb-title" class="text-white font-medium"></span>
    </nav>

    <!-- Título -->
    <h1 id="event-title"
        class="text-4xl md:text-6xl font-bold text-white mb-4">
    </h1>

    <span id="event-date" class="text-gray-300"></span>

    <p id="event-description"
       class="mt-6 text-gray-200 text-lg">
    </p>
  </div>

  <!-- Galería -->
  <section class="py-24">

    <div class="container mx-auto px-6">
      <h2 class="text-5xl text-white mb-12 text-center font-semibold">
        GALERÍA DE IMÁGENES Y VIDEOS
      </h2>

     <div id="event-gallery" class="columns-1 sm:columns-2 lg:columns-3 gap-6 space-y-6"></div>
    </div>
  </section>

</section>
