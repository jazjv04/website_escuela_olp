<section class="bg-gradient-to-t from-escuela-azul-oscuro to-escuela-azul-electrico text-white py-40">

    <!-- Título -->
    <div class="container mx-auto px-12 mb-24">
        <div class="max-w-4xl mx-auto text-center stagger-animate">
            <h1 class="text-5xl md:text-7xl font-passion mb-6 leading-tight stagger-item">
                EVENTOS
            </h1>
        </div>
    </div>

    <!-- Cards -->
    <div class="container mx-auto px-10 grid gap-10 lg:grid-cols-2">

        <!-- Card Feria Científica -->
        <div onclick="loadEvent('feria-cientifica')"
             class="cursor-pointer bg-white rounded-2xl shadow-md overflow-hidden
                    hover:shadow-xl transition-all duration-300">

            <img src="img/eventos/feria.jpg"
                 alt="Feria Científica"
                 class="h-56 w-full object-cover">

            <div class="p-6">
                <span class="text-xs text-gray-400 block mb-2">
                    Octubre 2026
                </span>

                <h3 class="font-semibold text-xl text-escuela-azul-oscuro mb-2">
                    Feria Científica
                </h3>

                <p class="text-sm text-gray-600">
                    Exposición de proyectos innovadores desarrollados por nuestros
                    estudiantes en diversas áreas del conocimiento.
                </p>
            </div>
        </div>

        <!-- Card Reinado -->
        <div onclick="loadEvent('reinado')"
             class="cursor-pointer bg-white rounded-2xl shadow-md overflow-hidden
                    hover:shadow-xl transition-all duration-300">

            <img src="img/eventos/reinado.jpg"
                 alt="Reinado"
                 class="h-56 w-full object-cover">

            <div class="p-6">
                <span class="text-xs text-gray-400 block mb-2">
                    Octubre 2026
                </span>

                <h3 class="font-semibold text-xl text-escuela-azul-oscuro mb-2">
                    Reinado
                </h3>

                <p class="text-sm text-gray-600">

                </p>
