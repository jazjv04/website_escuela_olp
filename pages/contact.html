<section class="bg-escuela-azul-oscuro text-white">

  <!-- HERO -->
<section class="bg-escuela-azul-oscuro to-escuela-azul-electrico text-white">
    <section class="bg-gradient-to-t from-escuela-azul-oscuro relative bg-escuela-azul-oscuro text-white py-36 overflow-hidden mb-16">

    <!-- Fondo decorativo -->
    <div class="absolute inset-0 bg-[url('images/portada.jpg')] bg-cover bg-center opacity-20 scale-110"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-escuela-azul-oscuro via-escuela-azul-oscuro/80 to-transparent"></div>

    <!-- Contenido -->
    <div class="relative container mx-auto px-12">
        <div class="max-w-4xl mx-auto text-center stagger-animate">
        <h1 class="text-6xl md:text-8xl font-passion mb-6 stagger-item">
            CONTÁCTANOS
        </h1>
        <p class="text-xl text-gray-200 stagger-item">
            Contáctanos para más información sobre nuestra institución.
        </p>
        </div>
    </div>
</section>


  <!-- INFO DE CONTACTO -->
  <section class="container mx-auto px-6 pb-24">

    <div class="grid md:grid-cols-2 gap-12">

      <!-- Datos -->
      <div class="space-y-8">

        <!-- Dirección -->
        <div class="flex items-start gap-4">
          <i class="fas fa-map-marker-alt text-2xl"></i>
          <div>
            <h3 class="font-semibold text-lg">Ubicación</h3>
            <p class="text-gray-300">Chiriquí, Panamá</p>
          </div>
        </div>

        <!-- Horario -->
        <div class="flex items-start gap-4">
          <i class="fas fa-clock text-2xl"></i>
          <div>
            <h3 class="font-semibold text-lg">Horario de Atención</h3>
            <p class="text-gray-300">6:30 a.m. - 2:00 p.m.</p>
          </div>
        </div>

      </div>


      <!-- FORMULARIO -->
      <div class="bg-white/10 backdrop-blur-md p-8 rounded-2xl shadow-xl">

        <h3 class="text-2xl font-semibold mb-6">Envíanos un mensaje</h3>

        <form class="space-y-4">

          <input type="text" placeholder="Nombre"
            class="w-full px-4 py-3 rounded-lg bg-white/20 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-white">

          <input type="email" placeholder="Correo"
            class="w-full px-4 py-3 rounded-lg bg-white/20 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-white">

          <textarea rows="4" placeholder="Mensaje"
            class="w-full px-4 py-3 rounded-lg bg-white/20 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-white"></textarea>

          <button type="submit"
            class="w-full bg-white text-escuela-azul-oscuro py-3 rounded-lg font-semibold hover:bg-gray-200 transition">
            Enviar mensaje
          </button>
        </form>
      </div>
    </div>
  </section>
</section>
